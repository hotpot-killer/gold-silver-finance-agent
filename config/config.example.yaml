# Active Finance Agent 配置
# 专注：黄金/白银市场主动监控 + AI分析 + 自动预警

# 全局配置
log_level: INFO
data_dir: ./data
cache_dir: ./cache

# Tushare 配置（获取国内金价/相关股票数据）
tushare:
  token: "your-tushare-token-here"

# LLM 配置（用于新闻/研报总结）
llm:
  provider: "openai"
  api_key: "your-openai-api-key"
  model: "gpt-4o-mini"
  base_url: ""  # 可填代理地址

# 监控配置
monitor:
  # 监控间隔（分钟）
  interval: 60
  # 自选股列表（黄金白银相关）
  stocks: []
    # - "600547.SH"  # 山东黄金
    # - "600489.SH"  # 中金黄金
  
  # 监控黄金
  gold:
    enabled: true
    symbol: "XAUUSD"  # COMEX伦敦金，使用腾讯财经免费API获取
  
  # 监控白银
  silver:
    enabled: true
    symbol: "XAGUSD"  # COMEX白银，使用腾讯财经免费API获取
  
  # 监控原油（WTI/布伦特）- 中东局势影响原油，原油影响美元和金银
  crude_oil:
    enabled: true
    symbol: "CL"  # WTI原油期货，使用腾讯财经免费API获取
  
  # 监控 ETF 持仓 
  # 市场经验：
  # - GLD (SPDR Gold Trust) 最大黄金ETF → 反映散户情绪
  # - SLV (iShares Silver Trust) 最大白银ETF → 反映庄家操作动向
  etf_monitor:
    enabled: true
    gld: true
    slv: true
  
  # COT持仓报告监控（CFTC机构持仓，领先指标）
  # 每周周五发布，提前反应机构极端仓位
  cot:
    enabled: true
  
  # 经济日历 - 提前提醒明天高影响宏观事件（非农/CPI/利率决议）
  economic_calendar:
    enabled: true
  
  # 新闻源
  # 支持: wallstreetcn, xueqiu, sina, caixin
  news_sources:
    - "wallstreetcn"
    - "xueqiu"
    - "sina"
    - "caixin"

# 研报/新闻总结配置
research:
  # 自动抓取最新新闻/研报
  auto_fetch: true
  # 只总结和黄金白银相关的新闻
  only_related: true
  # 输出总结条数
  summary_points: 3

# 长期概率预测配置（新增：基于宏观因子+LLM的多情景概率预测）
forecast:
  enabled: false            # 是否启用长期预测功能，需要yfinance + LLM API

# 预警规则配置（专注黄金白银）
# 升级后：从被动监控 → 主动信号生成
alerts:
  # ========== RSI系列（升级后：背离+穿越+加速） ==========
  # 黄金 RSI - 顶底背离 + 动量穿越 + 加速预警
  - name: "黄金 RSI 动能信号"
    asset: gold
    enabled: true
    type: "rsi"
    params:
      period: 14
      overbought_cross: 65     # 从超买区回落穿越65触发空头信号（比到75再触发更早）
      oversold_cross: 35     # 从超卖区回升穿越35触发多头信号
      lookback: 10           # 背离检测回看周期
      slope_threshold: 3    # RSI连续上涨加速阈值
      max_deviation_from_ma200: 0.2
  
  # 白银 RSI - 顶底背离 + 动量穿越 + 加速预警
  - name: "白银 RSI 动能信号"
    asset: silver
    enabled: true
    type: "rsi"
    params:
      period: 14
      overbought_cross: 65
      oversold_cross: 35
      lookback: 10
      slope_threshold: 3
      max_deviation_from_ma200: 0.2
  
  # ========== 均线系列（升级后：偏离 + 突破 + 金叉死叉） ==========
  # 黄金MA50偏离
  - name: "黄金MA50偏离"
    asset: gold
    enabled: true
    type: "ma_deviation"
    params:
      ma_period: 50
      threshold: 0.05  # 偏离超过5%触发
      direction: "both"  # up / down / both
      max_deviation_from_ma200: 0.2  # 只在偏离MA200不超过20%时触发（过滤强趋势行情，只抓震荡）
  
  # 白银MA50偏离
  - name: "白银MA50偏离"
    asset: silver
    enabled: true
    type: "ma_deviation"
    params:
      ma_period: 50
      threshold: 0.07  # 白银波动更大，阈值高一点
      direction: "both"
      max_deviation_from_ma200: 0.2
  
  # 黄金 - MA突破 + 金叉死叉（主动趋势信号）
  - name: "黄金均线信号"
    asset: gold
    enabled: true
    type: "ma_break"
    params:
      ma_period: 50       # 突破MA50触发
      fast_ma: 20         # 金叉死叉快慢线
      slow_ma: 50
  
  # 白银 - MA突破 + 金叉死叉（主动趋势信号）
  - name: "白银均线信号"
    asset: silver
    enabled: true
    type: "ma_break"
    params:
      ma_period: 50
      fast_ma: 20
      slow_ma: 50
  
  # ========== 波动率系列（升级后：分级预警） ==========
  # 黄金波动率 - 分级预警
  - name: "黄金波动率异常"
    asset: gold
    enabled: true
    type: "volatility"
    params:
      window: 20
      mild_threshold: 1.5    # 1.5倍 → 温和预警：开始放大
      strong_threshold: 2.0  # 2.0倍 → 强预警：大行情启动
      max_deviation_from_ma200: 0.2
  
  # 白银波动率 - 分级预警
  - name: "白银波动率异常"
    asset: silver
    enabled: true
    type: "volatility"
    params:
      window: 20
      mild_threshold: 1.5
      strong_threshold: 2.5  # 白银波动率更大
      max_deviation_from_ma200: 0.2
  
  # ========== 金银比极端值预警 ==========
  # 市场主流 80/50 法则：
  # - > 80–85 → 白银相对低估 → 历史上常是买入白银/换白银的好时机
  # - 70–80 → 正常偏高 → 黄金相对占优
  # - 55–70 → 大多数人认可的"正常区间中枢"
  # - < 50–55 → 白银相对强势/可能高估 → 历史上常对应白银大级别上涨后期
  # - < 40 → 极端低位（2011年最低≈32–35，之后白银见顶）
  - name: "金银比 极端区间"
    asset: gold-silver
    enabled: true
    type: "ratio"
    params:
      high: 85    # 85+ → 白银相对低估，关注做多白银/换仓白银
      low: 55     # 55- → 白银相对高估，关注做多黄金/做空白银
  
  # ========== COT极端持仓预警 ==========
  # COT持仓是典型领先指标：非商业净持仓极端拥挤往往预示反转
  - name: "COT 极端持仓预警"
    asset: cot
    enabled: true
    type: "cot_extreme"
  
  # ========== ETF持仓异动 ==========
  # GLD持仓异动（散户情绪）
  - name: "GLD 持仓异动 (散户情绪)"
    asset: gld
    enabled: true
    type: "volatility"
    params:
      window: 5
      mild_threshold: 1.2
      strong_threshold: 1.5  # 持仓变化超过1.5倍日均变化触发
  
  # SLV持仓异动（庄家动向）
  - name: "SLV 持仓异动 (庄家动向)"
    asset: slv
    enabled: true
    type: "volatility"
    params:
      window: 5
      mild_threshold: 1.2
      strong_threshold: 1.5
# 市场经验提示: 
# - GLD (黄金ETF) 持仓变化反映散户情绪
# - SLV (白银ETF) 持仓变化反映庄家操作动向

# 通知配置
notify:
  dingtalk:
    enabled: false
    webhook_url: "https://oapi.dingtalk.com/robot/send?access_token=xxx"
    secret: ""
  
  workwechat:
    enabled: false
    webhook_url: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=xxx"
  
  feishu:
    enabled: false
    webhook_url: "https://open.feishu.cn/open-apis/bot/v2/hook/xxx"
  
  telegram:
    enabled: false
    bot_token: "xxx"
    chat_id: "xxx"

# 定时任务配置
schedule:
  # 交易时段才运行
  only_trading_hours: true
  trading_hours:
    # 伦敦金交易时间（北京时间）：周一 06:00 ~ 周六 04:00
    start: "06:00"
    end: "04:00"

# 宏观数据 API keys
# FRED API key 免费申请: https://fred.stlouisfed.org/docs/api/api_key.html
data_api:
  fred: "your-fred-api-key-here"

# 长期概率预测
forecast:
  enabled: false            # 是否启用长期预测功能
  use_mixed_model: false   # True=使用混合模型(XGBoost + LLM)，False=使用MVP LLM-only版本
  xgb_model_path: "./models/gold_xgb.joblib"  # 预训练XGBoost模型路径

