name: Scheduled Gold-Silver Monitoring

# 每天运行一次监控（可以调整 cron 表达式修改频率）
# UTC 时间 0 点 = 北京时间 8 点
on:
  schedule:
    - cron: '0 0 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create config from secrets
        run: |
          cp config/config.example.yaml config/config.yaml
          # 替换配置中的敏感信息来自 GitHub Secrets
          sed -i "s/your_tushare_token_here/${{ secrets.TUSHARE_TOKEN }}/g" config/config.yaml
          # 如果使用飞书通知
          sed -i "s/your_feishu_webhook_url_here/${{ secrets.FEISHU_WEBHOOK }}/g" config/config.yaml
          # 如果使用 LLM 分析（可选）
          sed -i "s/your_openai_api_key_here/${{ secrets.LLM_API_KEY }}/g" config/config.yaml

      - name: Run monitoring once
        run: |
          python main.py --run-once

      - name: Finish
        run: |
          echo "Monitoring completed successfully!"
