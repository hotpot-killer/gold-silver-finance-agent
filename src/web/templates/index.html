<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gold-silver-finance-agent - 黄金白银智能监控</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.4.27/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #667eea;
            --primary-dark: #5568d3;
            --secondary: #764ba2;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 2px 10px rgba(0,0,0,0.08);
            --shadow-lg: 0 4px 20px rgba(0,0,0,0.12);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 32px 24px;
            border-radius: 16px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-lg);
        }
        h1 {
            font-size: 2.2rem;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .subtitle {
            opacity: 0.95;
            font-size: 1.1rem;
            font-weight: 300;
        }
        /* 前瞻市场链接 */
        .forward-markets {
            margin-top: 20px;
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 16px;
        }
        .forward-markets h3 {
            font-size: 1.1rem;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .market-links {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .market-link {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            transition: background 0.2s;
        }
        .market-link:hover {
            background: rgba(255,255,255,0.3);
        }
        /* 仪表盘样式 */
        .dashboard-section {
            margin-bottom: 24px;
        }
        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        .stat-number {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--primary);
            line-height: 1.2;
        }
        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 8px;
        }
        .recent-alerts-card {
            background: var(--card);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 20px;
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .recent-alert-item {
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .recent-alert-item:last-child {
            border-bottom: none;
        }
        .recent-alert-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .recent-alert-name {
            font-weight: 500;
            color: var(--text-primary);
        }
        /* 大佬观点专区样式 */
        .guru-section {
            background: var(--card);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 20px;
            margin-bottom: 24px;
        }
        .guru-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 16px;
        }
        .guru-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            transition: box-shadow 0.2s;
        }
        .guru-card:hover {
            box-shadow: var(--shadow-lg);
        }
        .guru-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 4px;
        }
        .guru-title {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }
        .guru-view {
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 8px;
        }
        .guru-tone {
            display: inline-block;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 500;
        }
        .tone-bullish {
            background: #dcfce7;
            color: #166534;
        }
        .tone-bearish {
            background: #fee2e2;
            color: #991b1b;
        }
        .tone-neutral {
            background: #fef3c7;
            color: #92400e;
        }
        .recent-alert-time {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .recent-alert-message {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .empty-recent {
            text-align: center;
            color: var(--text-secondary);
            padding: 20px;
            font-size: 0.9rem;
        }
        .filters-section {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }
        .filters-title {
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .filter-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .filter-btn {
            padding: 6px 14px;
            border: 1px solid var(--border);
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            color: var(--text-secondary);
        }
        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        .refresh-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            margin-left: auto;
            transition: background 0.2s;
        }
        .refresh-btn:hover {
            background: #0da271;
        }
        .refresh-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        /* 价格卡片样式 */
        .price-section {
            background: var(--card);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 20px;
            margin-bottom: 24px;
        }
        .price-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }
        .price-tab {
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .price-tab:hover {
            background: #f1f5f9;
        }
        .price-tab.active {
            background: var(--primary);
            color: white;
        }
        .current-price-card {
            display: flex;
            align-items: baseline;
            gap: 16px;
            margin-bottom: 16px;
        }
        .current-price {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--text-primary);
        }
        .price-change {
            font-size: 1.2rem;
        }
        .price-change.up {
            color: var(--danger);
        }
        .price-change.down {
            color: var(--success);
        }
        .kline-container {
            width: 100%;
            height: 400px;
            border-radius: 8px;
            overflow: hidden;
        }
        .price-loading {
            text-align: center;
            padding: 100px 20px;
            color: var(--text-secondary);
        }
        .alert-list {
            background: var(--card);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .alert-item {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            transition: background-color 0.2s;
        }
        .alert-item:hover {
            background-color: #fafbfc;
        }
        .alert-item:last-child {
            border-bottom: none;
        }
        .alert-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .alert-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-primary);
        }
        .alert-time {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .badge-asset {
            background: var(--primary);
            color: white;
        }
        .badge-type-ma_deviation {
            background: var(--warning);
            color: white;
        }
        .badge-type-rsi {
            background: var(--danger);
            color: white;
        }
        .badge-type-volatility {
            background: var(--secondary);
            color: white;
        }
        .badge-type-default {
            background: var(--text-secondary);
            color: white;
        }
        .alert-content {
            color: var(--text-secondary);
            margin-top: 10px;
            line-height: 1.7;
        }
        .alert-suggestion {
            margin-top: 8px;
            padding: 10px 14px;
            background: #f1f5f9;
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
            border-left: 4px solid var(--primary);
        }
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }
        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .load-more {
            text-align: center;
            padding: 20px;
        }
        .load-more-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .load-more-btn:hover {
            background: var(--primary);
            color: white;
        }
        .load-more-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .no-more {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            h1 {
                font-size: 1.6rem;
            }
            header {
                padding: 24px 16px;
            }
            .dashboard-stats {
                grid-template-columns: repeat(2, 1fr);
            }
            .stat-number {
                font-size: 1.8rem;
            }
            .alert-item {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="/static/app.js"></script>
</body>
</html>
