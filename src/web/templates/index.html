<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gold-silver-finance-agent - 黄金白银智能监控</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.4.27/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --accent: #06b6d4;
            --warning: #f59e0b;
            --danger: #ef4444;
            --success: #10b981;
            --bg: #020617;
            --bg-secondary: #0f172a;
            --bg-card: #1e293b;
            --bg-card-hover: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            --border: #334155;
            --border-light: #475569;
            --shadow: 0 10px 40px rgba(0,0,0,0.4);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.5);
            --glow-primary: 0 0 30px rgba(99, 102, 241, 0.3);
            --glow-accent: 0 0 25px rgba(6, 182, 212, 0.25);
            --glow-danger: 0 0 25px rgba(239, 68, 68, 0.25);
            --glow-warning: 0 0 25px rgba(245, 158, 11, 0.25);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #020617 50%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(6, 182, 212, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 10%, rgba(239, 68, 68, 0.06) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 24px;
            position: relative;
            z-index: 1;
        }
        header {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.18) 0%, rgba(139, 92, 246, 0.12) 50%, rgba(6, 182, 212, 0.08) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 40px 32px;
            border-radius: 24px;
            margin-bottom: 32px;
            box-shadow: var(--shadow-lg), var(--glow-primary);
            position: relative;
            overflow: hidden;
        }
        header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 60%;
            height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(25deg);
            animation: shimmer 10s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(25deg); }
            100% { transform: translateX(100%) rotate(25deg); }
        }
        h1 {
            font-size: 2.6rem;
            margin-bottom: 12px;
            font-weight: 800;
            letter-spacing: -0.8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        h1 .emoji {
            font-size: 3rem;
            filter: drop-shadow(0 4px 12px rgba(99, 102, 241, 0.5));
        }
        .subtitle {
            opacity: 0.95;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 0.3px;
        }
        /* 中东局势沙盘 - 核心重点 */
        .sandbox-section {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.1) 0%, rgba(245, 158, 11, 0.08) 50%, rgba(99, 102, 241, 0.06) 100%);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 32px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            box-shadow: var(--shadow-lg), var(--glow-danger);
            position: relative;
            overflow: hidden;
        }
        .sandbox-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--danger), var(--warning), var(--primary));
        }
        .sandbox-title {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-primary);
        }
        .sandbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .sandbox-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.95) 0%, rgba(15, 23, 42, 0.95) 100%);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .sandbox-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(239, 68, 68, 0.15);
            border-color: rgba(245, 158, 11, 0.4);
        }
        .sandbox-card.danger {
            border-color: rgba(239, 68, 68, 0.4);
        }
        .sandbox-card.danger:hover {
            box-shadow: 0 12px 40px rgba(239, 68, 68, 0.25);
        }
        .sandbox-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        .sandbox-card-name {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        .sandbox-card-prob {
            font-size: 1.3rem;
            font-weight: 800;
            padding: 4px 14px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        }
        .sandbox-card-prob.high {
            background: linear-gradient(135deg, var(--danger) 0%, var(--warning) 100%);
        }
        .sandbox-card-price {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }
        .sandbox-card-action {
            display: inline-block;
            padding: 8px 18px;
            border-radius: 12px;
            font-weight: 600;
            margin-top: 12px;
        }
        .sandbox-card-action.buy {
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
        }
        .sandbox-card-action.sell {
            background: linear-gradient(135deg, var(--danger) 0%, #dc2626 100%);
        }
        .sandbox-card-action.wait {
            background: linear-gradient(135deg, var(--warning) 0%, #d97706 100%);
        }
        .sandbox-triggers {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .sandbox-trigger {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sandbox-trigger::before {
            content: '•';
            color: var(--warning);
            font-weight: bold;
        }
        /* 仪表盘样式 */
        .dashboard-section {
            margin-bottom: 32px;
        }
        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(30, 41, 59, 0.8) 100%);
            backdrop-filter: blur(10px);
            padding: 28px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }
        .stat-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg), 0 0 30px rgba(99, 102, 241, 0.15);
            border-color: var(--primary);
        }
        .stat-number {
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
            letter-spacing: -1px;
        }
        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .recent-alerts-card {
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(30, 41, 59, 0.85) 100%);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 28px;
            border: 1px solid var(--border);
        }
        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .recent-alert-item {
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            transition: all 0.2s;
        }
        .recent-alert-item:last-child {
            border-bottom: none;
        }
        .recent-alert-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .recent-alert-name {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 1.02rem;
        }
        /* 价格卡片样式 */
        .price-section {
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(30, 41, 59, 0.85) 100%);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 28px;
            margin-bottom: 32px;
            border: 1px solid var(--border);
        }
        .price-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }
        .price-tab {
            padding: 12px 28px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }
        .price-tab:hover {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            transform: translateY(-2px);
        }
        .price-tab.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            box-shadow: 0 8px 28px rgba(99, 102, 241, 0.4);
            border-color: transparent;
        }
        .current-price-card {
            display: flex;
            align-items: baseline;
            gap: 20px;
            margin-bottom: 24px;
        }
        .current-price {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .price-change {
            font-size: 1.3rem;
            font-weight: 600;
        }
        .price-change.up {
            color: var(--danger);
        }
        .price-change.down {
            color: var(--success);
        }
        .kline-container {
            width: 100%;
            height: 480px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.9);
        }
        .price-loading {
            text-align: center;
            padding: 120px 20px;
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        .alert-list {
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(30, 41, 59, 0.85) 100%);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .alert-item {
            padding: 24px 28px;
            border-bottom: 1px solid var(--border);
            transition: all 0.3s;
        }
        .alert-item:hover {
            background: rgba(99, 102, 241, 0.05);
        }
        .alert-item:last-child {
            border-bottom: none;
        }
        .alert-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .alert-title {
            font-weight: 700;
            font-size: 1.15rem;
            color: var(--text-primary);
        }
        .alert-time {
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 24px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .badge-asset {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
        }
        .badge-type-ma_deviation {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.2) 0%, rgba(245, 158, 11, 0.1) 100%);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }
        .badge-type-rsi {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2) 0%, rgba(239, 68, 68, 0.1) 100%);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .badge-type-volatility {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2) 0%, rgba(139, 92, 246, 0.1) 100%);
            color: #a78bfa;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }
        .badge-type-default {
            background: linear-gradient(135deg, rgba(148, 163, 184, 0.2) 0%, rgba(148, 163, 184, 0.1) 100%);
            color: #94a3b8;
            border: 1px solid rgba(148, 163, 184, 0.3);
        }
        .alert-content {
            color: var(--text-secondary);
            margin-top: 12px;
            line-height: 1.7;
        }
        .alert-suggestion {
            margin-top: 12px;
            padding: 14px 18px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(6, 182, 212, 0.05) 100%);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.95rem;
            border-left: 4px solid var(--primary);
        }
        .empty-state {
            text-align: center;
            padding: 100px 20px;
            color: var(--text-muted);
        }
        .empty-state-icon {
            font-size: 4.5rem;
            margin-bottom: 20px;
            opacity: 0.4;
        }
        .loading {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 32px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }
            h1 {
                font-size: 1.8rem;
            }
            header {
                padding: 28px 20px;
            }
            .dashboard-stats {
                grid-template-columns: repeat(2, 1fr);
            }
            .stat-number {
                font-size: 2rem;
            }
            .alert-item {
                padding: 20px;
            }
            .price-tabs {
                flex-wrap: wrap;
            }
            .price-tab {
                flex: 1 1 45%;
                text-align: center;
            }
            .sandbox-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="/static/app.js"></script>
</body>
</html>
